name: Order Repository CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: write

jobs:
  order-test:

    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16

        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres

        ports:
          - 5432:5432

        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 22

      - name: Verify Java Version
        run: java -version

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Verify Gradle Version
        run: ./gradlew --version

      - name: Make Gradle Wrapper Executable
        run: chmod +x gradlew

      - name: Run Order Test
        run: ./gradlew clean test --info
        env:
          JAVA_TOOL_OPTIONS: >
            -Ddb.url=jdbc:postgresql://localhost:5432/testdb
            -Ddb.user=postgres
            -Ddb.password=postgres

      # Debug step (safe to keep while developing)
      - name: Debug Allure Results
        if: always()
        run: |
          echo "=== Allure Results ==="
          ls -la build/allure-results || true

          echo "=== Test Reports ==="
          ls -R build/reports || true

          echo "=== Result JSON ==="
          cat build/allure-results/*-result.json || true

      # Upload JUnit reports
      - name: Upload JUnit Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-test-results
          path: build/test-results/

      # Checkout gh-pages history
      - name: Checkout gh-pages branch
        if: always()
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      # Generate Allure Report
      - name: Generate Allure Report
        if: always()
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: build/allure-results
          allure_report: allure-report
          gh_pages: gh-pages
          allure_history: allure-history

      # Upload Allure files as workflow artifacts
      - name: Upload Allure Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: |
            build/allure-results
            allure-report
            allure-history

      # Publish report to GitHub Pages
      - name: Deploy report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history